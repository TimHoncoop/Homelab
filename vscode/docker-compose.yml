services:
  code-server:
    image: lscr.io/linuxserver/code-server:latest
    container_name: code-server
    environment:
      - TZ=Europe/Amsterdam
      - PASSWORD=${PASSWORD}
    volumes:
      - data:/config/data/config
      - homepage_config:/workspace/homespace
    ports:
      - 8443:8443
    restart: unless-stopped

volumes:
  data:
  homepage_config:
    external: true
    name: homepage_homepage_config